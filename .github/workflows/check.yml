name: check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg: [lint, typecheck, unit]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run lint
        if: matrix.leg == 'lint'
        run: uv run ruff check src tests

      - name: Run type check
        if: matrix.leg == 'typecheck'
        run: uv run mypy src

      - name: Run tests
        if: matrix.leg == 'unit'
        run: uv run pytest -q
